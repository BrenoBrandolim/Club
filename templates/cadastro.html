<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Club · Criar Conta</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="auth-page">

    <div style="text-align:center; margin-bottom:8px;">
        <a href="/login" style="color:var(--text-sub); font-size:13px; text-decoration:none;">← Voltar</a>
    </div>

    <div class="auth-logo">CLUB</div>
    <p class="auth-sub">Criar Conta</p>

    <div class="auth-form">
        <div class="form-group">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Seu nome" autocomplete="name">
        </div>

        <div class="form-group">
            <label>Nickname</label>
            <input type="text" id="nickname" placeholder="seu_nickname"
                   autocapitalize="none" spellcheck="false" autocomplete="username">
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>

        <button class="btn btn-gold btn-full btn-lg mt-24" id="btn-cadastrar">
            Criar Conta
        </button>

        <div class="auth-footer mt-16">
            Já tem conta? <a href="/login">Entrar</a>
        </div>
    </div>

</div>

<script type="module">
import { cadastrar } from "/static/js/auth.js";

const btn = document.getElementById("btn-cadastrar");

btn.addEventListener("click", async () => {
    const nome     = document.getElementById("nome").value.trim();
    const nickname = document.getElementById("nickname").value.trim();
    const senha    = document.getElementById("senha").value;

    if (!nome || !nickname || !senha) return;
    if (senha.length < 6) {
        import("/static/js/toast.js").then(m => m.toastError("Senha deve ter ao menos 6 caracteres"));
        return;
    }

    btn.disabled = true;
    btn.textContent = "Criando…";
    await cadastrar(nome, nickname, senha);
    btn.disabled = false;
    btn.textContent = "Criar Conta";
});
</script>

</body>
</html>
