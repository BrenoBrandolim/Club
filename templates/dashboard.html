<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Club · Comenza Food</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="bottom-nav">
    <a href="/dashboard" class="active"><span class="nav-icon">⬡</span>Início</a>
    <a href="/catalogo"><span class="nav-icon">✦</span>Catálogo</a>
    <a href="/placar"><span class="nav-icon">🏆</span>Placar</a>
    <a href="/menu"><span class="nav-icon">☰</span>Menu</a>
</nav>

<div class="page">

    <!-- Topbar com logo -->
    <div class="topbar">
        <a class="topbar-logo" href="/dashboard">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRrESNU9fNm-eOGSmBkWMvKDjh-0cB7ElKlCg&s"
                 alt="Comenza" onerror="this.style.display='none'">
            CLUB
        </a>
        <div>
            <div style="font-size:13px; color:var(--text-sub); text-align:right; font-weight:500;" id="user-nome">—</div>
            <div style="font-size:11px; color:var(--text-dim); text-align:right; font-style:italic;" id="user-nickname">—</div>
        </div>
    </div>

    <!-- Card de saldo -->
    <div class="section">
        <div class="saldo-card">
            <div class="saldo-label">Seus Pontos</div>
            <div class="saldo-valor" id="saldo-valor">0,00</div>
            <div class="saldo-unidade">pontos disponíveis</div>
            <a href="/catalogo" class="btn btn-gold btn-sm" style="margin-top:22px; display:inline-flex;">
                ✦ Ver Catálogo
            </a>
        </div>
    </div>

    <!-- Comanda ativa (preenchida pelo JS) -->
    <div class="section" style="padding-top:0;" id="comanda-ativa-section"></div>

    <!-- Estado vazio: sem comanda -->
    <div class="section" style="padding-top:0; display:none;" id="sem-comanda-section">
        <div style="padding:20px; text-align:center; border:1px dashed rgba(196,136,30,0.20);
                    border-radius:var(--radius-lg); background:rgba(196,136,30,0.03);">
            <div style="font-size:32px; margin-bottom:10px; opacity:.7;">📱</div>
            <p style="font-size:13px; color:var(--text-sub); line-height:1.7;">
                Escaneie o <strong style="color:var(--amber); font-weight:600;">QR Code da sua mesa</strong><br>
                para vincular sua comanda e ganhar pontos automaticamente.
            </p>
        </div>
    </div>

    <!-- Últimos resgates -->
    <div class="section" style="padding-top:0;">
        <div class="section-header">
            <span class="section-title">Últimos Resgates</span>
            <a href="/resgates" style="color:var(--amber); font-size:11px; text-decoration:none; font-weight:600; letter-spacing:0.5px;">Ver todos →</a>
        </div>
        <div id="resgates-lista">
            <div class="skeleton" style="height:68px; border-radius:var(--radius-md); margin-bottom:9px;"></div>
            <div class="skeleton" style="height:68px; border-radius:var(--radius-md);"></div>
        </div>
    </div>

    <!-- Pontos recentes -->
    <div class="section" style="padding-top:0; padding-bottom:110px;">
        <div class="section-header">
            <span class="section-title">Pontos Recentes</span>
            <a href="/historico" style="color:var(--amber); font-size:11px; text-decoration:none; font-weight:600; letter-spacing:0.5px;">Ver todos →</a>
        </div>
        <div class="card" style="padding:0 16px;">
            <div id="historico-lista">
                <div class="skeleton" style="height:50px; margin:10px 0; border-radius:var(--radius-sm);"></div>
                <div class="skeleton" style="height:50px; margin:10px 0; border-radius:var(--radius-sm);"></div>
                <div class="skeleton" style="height:50px; margin:10px 0; border-radius:var(--radius-sm);"></div>
            </div>
        </div>
    </div>

</div>

<script type="module" src="/static/js/dashboard.js"></script>
</body>
</html>
