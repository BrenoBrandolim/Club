<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Club · Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="bottom-nav">
    <a href="/dashboard" class="active"><span class="nav-icon">⬡</span>Início</a>
    <a href="/catalogo"><span class="nav-icon">✦</span>Catálogo</a>
    <a href="/placar"><span class="nav-icon">🏆</span>Placar</a>
    <a href="/menu"><span class="nav-icon">☰</span>Menu</a>
</nav>

<div class="page">
    <div class="topbar">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRrESNU9fNm-eOGSmBkWMvKDjh-0cB7ElKlCg&s" 
                 alt="Comenza" style="height:32px; border-radius:6px; object-fit:contain;" 
                 onerror="this.style.display='none'">
            <span class="topbar-logo" style="font-size:20px;">CLUB</span>
        </div>
        <div>
            <div style="font-size:13px; color:var(--text-sub); text-align:right;" id="user-nome">—</div>
            <div style="font-size:11px; color:var(--text-dim); text-align:right;" id="user-nickname">—</div>
        </div>
    </div>

    <div class="section">
        <div class="saldo-card">
            <div class="saldo-label">Seus Pontos</div>
            <div class="saldo-valor" id="saldo-valor">0,00</div>
            <div class="saldo-unidade">pontos disponíveis</div>
            <a href="/catalogo" class="btn btn-gold btn-sm" style="margin-top:20px; display:inline-flex;">
                ✦ Ver Catálogo
            </a>
        </div>
    </div>

    <div class="section" style="padding-top:0;" id="comanda-ativa-section"></div>

    <div class="section" style="padding-top:0;" id="sem-comanda-section" style="display:none;">
        <div class="card" style="padding:18px 20px; text-align:center; border-style:dashed;">
            <div style="font-size:28px; margin-bottom:8px;">📱</div>
            <p style="font-size:13px; color:var(--text-sub); line-height:1.6;">
                Escaneie o <strong style="color:var(--gold);">QR Code da sua mesa</strong> para vincular sua comanda 
                e ganhar pontos automaticamente.
            </p>
        </div>
    </div>

    <div class="section" style="padding-top:0;">
        <div class="section-header">
            <span class="section-title" style="font-size:18px;">Últimos Resgates</span>
            <a href="/resgates" style="color:var(--gold); font-size:12px; text-decoration:none; font-weight:600;">Ver todos →</a>
        </div>
        <div id="resgates-lista">
            <div class="skeleton" style="height:72px;border-radius:var(--radius-md);margin-bottom:10px;"></div>
            <div class="skeleton" style="height:72px;border-radius:var(--radius-md);margin-bottom:10px;"></div>
        </div>
    </div>

    <div class="section" style="padding-top:0; padding-bottom:100px;">
        <div class="section-header">
            <span class="section-title" style="font-size:18px;">Pontos Recentes</span>
            <a href="/historico" style="color:var(--gold); font-size:12px; text-decoration:none; font-weight:600;">Ver todos →</a>
        </div>
        <div class="card" style="padding:0 16px;">
            <div id="historico-lista">
                <div class="skeleton" style="height:54px;margin:10px 0;border-radius:var(--radius-sm);"></div>
                <div class="skeleton" style="height:54px;margin:10px 0;border-radius:var(--radius-sm);"></div>
                <div class="skeleton" style="height:54px;margin:10px 0;border-radius:var(--radius-sm);"></div>
            </div>
        </div>
    </div>
</div>

<script type="module" src="/static/js/dashboard.js"></script>
</body>
</html>
